<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>{{ title or 'Panel @sindicatosdpMAD' }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-copy">
      <p class="eyebrow">@sindicatosdpMAD</p>
      <h1>{{ title or 'Dashboard' }}</h1>
      <p class="topbar-subtitle">Revisión móvil de candidatos, respuestas IA y publicación segura.</p>
    </div>
    <span class="status-pill">Caddy Auth</span>
  </header>

  <main class="container">
    {% if request.query_params.get('saved') %}
      <div class="notice success">Cambios guardados.</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav" aria-label="Navegación principal">
    <a class="{{ 'active' if path == '/' else '' }}" href="/">Inicio</a>
    <a class="{{ 'active' if path.startswith('/cola') or path.startswith('/candidatos') else '' }}" href="/cola">Cola</a>
    <a class="{{ 'active' if path.startswith('/filtros') else '' }}" href="/filtros">Filtros</a>
    <a class="{{ 'active' if path.startswith('/scheduler') or path.startswith('/limites') else '' }}" href="/scheduler">Auto</a>
    <a class="{{ 'active' if path.startswith('/logs') else '' }}" href="/logs">Logs</a>
  </nav>
</body>
</html>
